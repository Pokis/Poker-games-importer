<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poker Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>♠️ Poker Dash</h2>
            </div>
            
            <div class="filter-section">
                <h3>Filters</h3>
                
                <div class="filter-group">
                    <label for="format-filter">Format</label>
                    <select id="format-filter">
                        <option value="All">All Formats</option>
                        <option value="Tournament">Tournament</option>
                        <option value="Cash">Cash Game</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <div class="filter-label-row">
                        <label>Game Types</label>
                        <div class="filter-actions">
                            <button type="button" id="select-all-btn">All</button>
                            <button type="button" id="clear-all-btn">None</button>
                        </div>
                    </div>
                    <div class="game-types-list" id="game-types-list">
                        <!-- Checkboxes injected by JS -->
                    </div>
                </div>

                <div class="filter-group">
                    <label>Buy-in Range</label>
                    <div class="range-inputs">
                        <input type="number" id="buyin-min" placeholder="Min ($)" min="0" step="any">
                        <span class="range-separator">to</span>
                        <input type="number" id="buyin-max" placeholder="Max ($)" min="0" step="any">
                    </div>
                </div>
            </div>
            
            <div class="sidebar-footer">
                <button id="refresh-btn">Refresh Data</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1>Performance Overview</h1>
                <p id="last-updated">Loading...</p>
            </header>

            <!-- Metric Cards -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-title">Total Hands</div>
                    <div class="metric-value" id="val-total-hands">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Net Profit (Chips)</div>
                    <div class="metric-value" id="val-net-chips">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Net Profit (BB)</div>
                    <div class="metric-value" id="val-net-bb">-</div>
                </div>
                <div class="metric-card">
                    <div class="metric-title">Rake Paid</div>
                    <div class="metric-value" id="val-rake">-</div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="charts-section">
                <!-- Cumulative Profit Line Chart -->
                <div class="chart-container line-chart-container">
                    <h3>Cumulative Profit (Chips)</h3>
                    <div class="chart-wrapper">
                        <canvas id="profitChart"></canvas>
                    </div>
                </div>

                <!-- Game Type Breakdown -->
                <div class="chart-container bar-chart-container">
                    <h3>Profit by Game Type</h3>
                    <div class="chart-wrapper">
                        <canvas id="gameTypeChart"></canvas>
                    </div>
                </div>

                <!-- Cumulative Profit Line Chart (BB) -->
                <div class="chart-container line-chart-container">
                    <h3>Cumulative Profit (BB)</h3>
                    <div class="chart-wrapper">
                        <canvas id="profitBbChart"></canvas>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
